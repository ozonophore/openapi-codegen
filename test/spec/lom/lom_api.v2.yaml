openapi: 3.1.0

info:
  title: Lord of the Mysteries API
  description: >
    API, вдохновлённое вселенной "Повелитель тайн".
    Позволяет работать с путями, последовательностями и продвижением по ним.
  version: 2.0.0

servers:
  - url: https://api.lotm.example.com
    description: Production server
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Pathways
    description: Пути и их информация
  - name: Sequences
    description: Последовательности пути
  - name: Ingredients
    description: Ингредиенты для продвижения
  - name: Advancement
    description: Продвижение по последовательности

paths:
  /pathways:
    $ref: 'requests/pathways.yaml'

  /pathways/{pathwayId}:
    $ref: 'requests/pathwaysById.yaml'

  /pathways/{pathwayId}/sequences:
    $ref: 'requests/pathwaysSequences.yaml'

  /sequences/{sequenceId}:
    $ref: 'requests/sequenceById.yaml'

  /sequences/{sequenceId}/ingredients:
    $ref: 'requests/ingredientsBySequence.yaml'

  /advancements:
    $ref: 'requests/advancements.yaml'

components:
  schemas:
    Pathway:
      $ref: './components/schemas/Pathway.yaml'
    Sequence:
      $ref: './schemas-v2/Sequence.yaml'
    Ingredient:
      $ref: './schemas-v2/Ingredient.yaml'
    AdvancementRequest:
      $ref: './components/schemas/AdvancementRequest.yaml'
    AdvancementResult:
      $ref: './components/schemas/AdvancementResult.yaml'
    ProblemDetails:
      $ref: './components/schemas/ProblemDetails.yaml'
  responses:
    BadRequest:
      $ref: './components/responses/BadRequest.yaml'
    NotFound:
      $ref: './components/responses/NotFound.yaml'
